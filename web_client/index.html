<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PlayAural">
  <meta name="mobile-web-app-capable" content="yes">
  <title>PlayAural Web</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="recaptcha-hidden">
  <main id="app" class="app-shell">
    <section id="auth-screen" class="auth-screen" aria-labelledby="auth-title">
      <div class="auth-card panel">
        <div class="brand-block">
          <p class="eyebrow">PlayAural</p>
          <h1 id="auth-title">PlayAural Web</h1>
          <p id="auth-intro">Audio-first online games for everyone.</p>
        </div>

        <div id="auth-controls" class="auth-toolbar row" aria-label="Client controls">
          <label class="compact-field" for="language-select">
            <span id="language-label">Language</span>
            <select id="language-select">
              <option value="en">English</option>
              <option value="vi">Tiếng Việt</option>
            </select>
          </label>
          <button id="btn-install-pwa" type="button" class="secondary" hidden>Install App</button>
        </div>
        <p id="install-instruction" class="muted" hidden></p>

        <div id="saved-session-view" class="saved-session" hidden>
          <p id="saved-session-label"></p>
          <div class="row">
            <button id="btn-play-now" type="button">Play</button>
            <button id="btn-remove-account" type="button" class="secondary">Remove Account</button>
          </div>
        </div>

        <nav id="account-actions-nav" class="auth-nav" aria-label="Account actions">
          <button id="btn-show-login" type="button" class="auth-nav-btn active">Login</button>
          <button id="btn-show-register" type="button" class="auth-nav-btn">Register</button>
          <button id="btn-show-forgot-password" type="button" class="auth-nav-btn">Forgot Password?</button>
        </nav>

        <section id="login-panel" class="auth-panel">
          <form id="login-form">
            <label for="username" id="login-username-label">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required>

            <label for="password" id="login-password-label">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <label class="check-row" for="chk-auto-login">
              <input id="chk-auto-login" type="checkbox">
              <span id="label-auto-login">Remember me</span>
            </label>

            <button id="login-btn" type="submit">Connect & Login</button>
            <p id="login-status" class="status" role="status" aria-live="polite"></p>
          </form>
        </section>

        <section id="register-panel" class="auth-panel" hidden>
          <form id="register-form">
            <label for="reg-username" id="reg-username-label">Username</label>
            <input id="reg-username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required>

            <label for="reg-email" id="reg-email-label">Email</label>
            <input id="reg-email" type="email" autocomplete="email" required>

            <label for="reg-password" id="reg-password-label">Password</label>
            <input id="reg-password" type="password" autocomplete="new-password" required>

            <label for="reg-password-confirm" id="label-confirm-password">Confirm Password</label>
            <input id="reg-password-confirm" type="password" autocomplete="new-password" required>

            <button id="btn-register" type="submit">Register</button>
            <p id="register-status" class="status" role="status" aria-live="polite"></p>
          </form>
        </section>

        <section id="forgot-panel" class="auth-panel" hidden>
          <form id="forgot-password-form">
            <p id="forgot-password-prompt">Enter the email address associated with your account.</p>
            <label for="forgot-email" id="forgot-email-label">Email</label>
            <input id="forgot-email" type="email" autocomplete="email" required>
            <button id="btn-send-reset-code" type="submit">Send Code</button>
            <p id="forgot-password-status" class="status" role="status" aria-live="polite"></p>
          </form>
        </section>

        <section id="reset-panel" class="auth-panel" hidden>
          <form id="reset-password-form">
            <h2 id="reset-password-title">Reset Password</h2>
            <p id="reset-code-instructions"></p>
            <label for="reset-code" id="reset-code-label">Reset code</label>
            <input id="reset-code" type="text" inputmode="numeric" autocomplete="one-time-code" required>
            <label for="new-password" id="new-password-label">New Password</label>
            <input id="new-password" type="password" autocomplete="new-password" required>
            <label for="confirm-new-password" id="confirm-new-password-label">Confirm Password</label>
            <input id="confirm-new-password" type="password" autocomplete="new-password" required>
            <button id="btn-submit-reset" type="submit">Reset Password</button>
            <p id="reset-password-status" class="status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>

    <section id="game-screen" class="game-screen" hidden aria-label="PlayAural game client">
      <div id="game-shell" class="game-grid">
        <section class="panel menu-panel" aria-labelledby="menu-heading">
          <div class="panel-heading row">
            <h2 id="menu-heading">Menu</h2>
            <button id="actions-btn" type="button" class="secondary actions-btn" hidden>Actions</button>
          </div>
          <ul id="menu-list" class="menu-list" tabindex="0" aria-label="Game menu"></ul>
          <div id="inline-input" class="inline-input" hidden>
            <label id="inline-input-prompt" for="inline-input-text"></label>
            <input
              id="inline-input-text"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              enterkeyhint="done"
            >
            <textarea
              id="inline-input-value"
              rows="6"
              autocomplete="off"
              autocapitalize="none"
              autocorrect="off"
              spellcheck="false"
              enterkeyhint="done"
              hidden
            ></textarea>
            <div class="row">
              <button id="inline-input-submit" type="button">Submit</button>
              <button id="inline-input-cancel" type="button" class="secondary">Cancel</button>
            </div>
          </div>
        </section>

        <section class="panel history-panel" aria-labelledby="history-heading">
          <div class="history-header">
            <button id="history-toggle" class="history-toggle-title" type="button" aria-expanded="true">
              <h2 id="history-heading">History</h2>
            </button>
            <label for="history-buffer" class="compact-field">
              <span id="history-buffer-label">Buffer</span>
              <select id="history-buffer">
                <option id="buffer-option-all" value="all">All</option>
                <option id="buffer-option-chat" value="chat">Chat</option>
                <option id="buffer-option-game" value="game">Game</option>
                <option id="buffer-option-system" value="system">System</option>
                <option id="buffer-option-misc" value="misc">Misc</option>
              </select>
            </label>
          </div>
          <div id="history-content">
            <textarea id="history" class="history" readonly aria-label="Message history"></textarea>
            <div id="history-log" class="history-log" tabindex="0" aria-label="Message history log"></div>
          </div>
        </section>
      </div>

      <section class="panel chat-panel" aria-labelledby="chat-heading">
        <h2 id="chat-heading">Chat and Voice</h2>
        <form id="chat-form" class="chat-form">
          <label for="chat-input" id="chat-input-label">Chat Message</label>
          <div class="row chat-row">
            <input id="chat-input" type="text" autocomplete="off" placeholder="Type a message...">
            <button id="btn-chat-send" type="submit">Send</button>
          </div>
        </form>
        <div class="voice-card" aria-labelledby="voice-chat-heading">
          <h3 id="voice-chat-heading">Voice Chat</h3>
          <div class="row">
            <button id="btn-voice-join" type="button">Join Voice Chat</button>
            <button id="btn-voice-leave" type="button" class="secondary" hidden>Leave Voice Chat</button>
            <button id="btn-voice-mic" type="button" class="secondary" aria-pressed="false" hidden>Turn On Mic</button>
          </div>
          <p id="voice-chat-status" class="status" role="status" aria-live="polite">Voice Chat not connected.</p>
          <div id="voice-chat-audio" aria-hidden="true"></div>
        </div>
      </section>

      <section id="audio-panel" class="panel audio-panel" aria-label="Audio controls">
        <div class="row volume-controls">
          <label for="sound-volume"><span id="audio-sound-label">Sound</span> <output id="sound-volume-value">100%</output></label>
          <input id="sound-volume" type="range" min="10" max="100" step="1">
          <label for="music-volume"><span id="audio-music-label">Music</span> <output id="music-volume-value">10%</output></label>
          <input id="music-volume" type="range" min="0" max="100" step="1">
          <label for="ambience-volume"><span id="audio-ambience-label">Ambience</span> <output id="ambience-volume-value">20%</output></label>
          <input id="ambience-volume" type="range" min="0" max="100" step="1">
          <label for="voice-volume"><span id="audio-voice-label">Voice</span> <output id="voice-volume-value">80%</output></label>
          <input id="voice-volume" type="range" min="10" max="100" step="1">
          <label class="check-row" for="audio-mute">
            <input id="audio-mute" type="checkbox">
            <span id="audio-mute-label">Mute browser audio</span>
          </label>
        </div>
      </section>

      <section class="panel shortcuts-panel" aria-labelledby="shortcuts-heading">
        <h2 id="shortcuts-heading">Shortcuts</h2>
        <div class="row">
          <button id="btn-list-online" type="button" class="secondary">Read Online Players</button>
          <button id="btn-list-online-games" type="button" class="secondary">List Players with Games</button>
          <button id="btn-open-friends" type="button" class="secondary">Open Friends</button>
          <button id="btn-open-options" type="button" class="secondary">Open Options</button>
          <button id="btn-check-ping" type="button" class="secondary">Check Ping</button>
        </div>
      </section>
    </section>
  </main>

  <div id="live-polite" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  <div id="live-assertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <script src="vendor/livekit-client.umd.js"></script>
  <script type="module" src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
