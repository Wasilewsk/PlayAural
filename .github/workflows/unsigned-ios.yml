name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-15
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          npx expo prebuild --platform ios --no-install 2>&1 || true

      - name: Patch Podfile and install CocoaPods
        run: |
          cd mobile_client/ios

          # Remove any existing post_install block (nesting-aware), then append a
          # fresh one.  Cocoapods (>= 1.12) rejects duplicate post_install hooks.
          ruby -e '
            content = File.read("Podfile")
            lines = content.lines
            out = []
            i = 0
            while i < lines.length
              line = lines[i]
              if line =~ /^\s*post_install\b/
                depth = 0
                depth += line.scan(/\bdo\b/).length + line.count("{")
                depth -= line.count("}")
                depth -= 1 if line.strip.start_with?("end")
                i += 1
                while i < lines.length && depth > 0
                  cur = lines[i]
                  stripped = cur.strip
                  unless stripped.start_with?("#")
                    depth += cur.scan(/\bdo\b/).length + cur.count("{")
                    depth -= cur.count("}")
                    depth -= 1 if stripped.start_with?("end")
                  end
                  i += 1
                end
              else
                out << line
                i += 1
              end
            end
            out << "\npost_install do |installer|\n"
            out << "  installer.pods_project.targets.each do |target|\n"
            out << "    target.build_configurations.each do |config|\n"
            out << "      config.build_settings[\"SWIFT_STRICT_CONCURRENCY\"] = \"minimal\"\n"
            out << "      config.build_settings[\"SWIFT_VERSION\"] = \"6.0\"\n"
            out << "      config.build_settings[\"CLANG_CXX_LANGUAGE_STANDARD\"] = \"gnu++20\"\n"
            out << "      existing = config.build_settings[\"OTHER_SWIFT_FLAGS\"] || \"\"\n"
            out << "      config.build_settings[\"OTHER_SWIFT_FLAGS\"] = (existing + \" -strict-concurrency=minimal\").strip\n"
            out << "      config.build_settings[\"DEFINES_MODULE\"] = \"YES\"\n"
            out << "    end\n"
            out << "  end\n"
            out << "end\n"
            File.write("Podfile", out.join)
            puts "Podfile rewritten with SWIFT_STRICT_CONCURRENCY=minimal post_install hook."
          '

          pod install --repo-update

      - name: Detect workspace and scheme
        id: detect
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE=""
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              WORKSPACE="$d"
              break
            fi
          done
          echo "Found workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"

          # The app scheme matches the Xcode project name (PlayAuralMobile).
          # Pod auto-generated schemes (Pods-*, EX*, React-*, hermes*, etc.)
          # are never the right build target for the app itself.
          APP_NAME="PlayAuralMobile"
          SCHEME=""

          SCHEMES_JSON=$(xcodebuild -list -json -workspace "$WORKSPACE" 2>/dev/null || true)
          if [ -n "$SCHEMES_JSON" ]; then
            SCHEME=$(echo "$SCHEMES_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ws = d.get('workspace', {})
          schemes = ws.get('schemes', []) or d.get('project', {}).get('schemes', [])
          app_name = '$APP_NAME'
          for s in schemes:
              if s == app_name:
                  print(s)
                  sys.exit(0)
          print('')
          ")
          fi

          if [ -z "$SCHEME" ]; then
            # Fallback: use the project name directly
            SCHEME="$APP_NAME"
          fi

          echo "Found scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build .app with xcodebuild
        id: build
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE="${{ steps.detect.outputs.WORKSPACE }}"
          SCHEME="${{ steps.detect.outputs.SCHEME }}"
          DD="$PWD/build/DerivedData"

          export REACT_NATIVE_PATH="$GITHUB_WORKSPACE/mobile_client/node_modules/react-native"

          if [ ! -f "$REACT_NATIVE_PATH/scripts/xcode/with-environment.sh" ]; then
            echo "Error: $REACT_NATIVE_PATH/scripts/xcode/with-environment.sh not found."
            echo "Check that npx expo prebuild and pod install completed successfully."
            exit 1
          fi

          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DD" \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CLANG_CXX_LANGUAGE_STANDARD=gnu++20 2>&1

          APP_PATH=$(find "$DD" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app produced. Build failed."
            exit 1
          fi
          echo "App found at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package unsigned .ipa
        id: package
        run: |
          set -e
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa
          echo "IPA=$PWD/PlayAuralMobile-unsigned.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
