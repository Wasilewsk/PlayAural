name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          # --no-install should skip pod install, but Expo 55 may still
          # attempt it inside expo run:ios.  Ignore failures here — the
          # dedicated Install CocoaPods step handles pod installation.
          npx expo prebuild --platform ios --no-install 2>&1 || true

      - name: Install CocoaPods
        run: |
          cd mobile_client/ios

          # Remove any existing post_install block (nesting-aware), then append a
          # fresh one.  Cocoapods (>= 1.12) rejects duplicate post_install hooks.
          ruby -e '
            content = File.read("Podfile")
            lines = content.lines
            out = []
            i = 0
            while i < lines.length
              line = lines[i]
              if line =~ /^\s*post_install\b/
                depth = 0
                # count openers/closers on the post_install line itself
                depth += line.scan(/\bdo\b/).length + line.count("{")
                depth -= line.count("}")
                depth -= 1 if line.strip.start_with?("end")
                i += 1
                while i < lines.length && depth > 0
                  cur = lines[i]
                  stripped = cur.strip
                  unless stripped.start_with?("#")
                    depth += cur.scan(/\bdo\b/).length + cur.count("{")
                    depth -= cur.count("}")
                    depth -= 1 if stripped.start_with?("end")
                  end
                  i += 1
                end
                # block fully removed, skip to next line
              else
                out << line
                i += 1
              end
            end
            # Append a fresh post_install hook at the end
            out << "\npost_install do |installer|\n"
            out << "  installer.pods_project.targets.each do |target|\n"
            out << "    target.build_configurations.each do |config|\n"
            out << "      config.build_settings[\"SWIFT_STRICT_CONCURRENCY\"] = \"minimal\"\n"
            out << "    end\n"
            out << "  end\n"
            out << "end\n"
            File.write("Podfile", out.join)
            puts "Podfile rewritten with SWIFT_STRICT_CONCURRENCY=minimal post_install hook."
          '

          pod install --repo-update

      - name: Detect workspace and scheme
        id: detect
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE=""
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              WORKSPACE="$d"
              break
            fi
          done
          echo "Found workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"

          # Use -json for reliable scheme detection.
          # Pod auto-generated schemes (EX*, React-*, hermes*, etc.) are listed
          # first alphabetically — skip them and pick the first non-Pod scheme.
          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ws=d.get('workspace',{}); schemes=ws.get('schemes',[]) or d.get('project',{}).get('schemes',[]); skip=['Pods-','EX','React-','hermes','FBL','RCT','lib','cxx']; filtered=[s for s in schemes if not any(s.startswith(p) for p in skip)]; print(filtered[0] if filtered else (schemes[0] if schemes else ''))")
          if [ -z "$SCHEME" ]; then
            # Fallback: grep the .xcodeproj for scheme names
            SCHEME=$(ls -d *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj//')
          fi
          echo "Found scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build .app with xcodebuild
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE="${{ steps.detect.outputs.WORKSPACE }}"
          SCHEME="${{ steps.detect.outputs.SCHEME }}"
          DD="$PWD/build/DerivedData"

          # Must specify iOS destination — otherwise xcodebuild defaults to
          # Mac Catalyst where ExpoModulesCore headers are incomplete.
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DD" \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal 2>&1 || true

          # Find the built .app in DerivedData
          APP_PATH=$(find "$DD" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app produced. Build failed."
            exit 1
          fi
          echo "App found at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"
        id: build

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa
          echo "IPA=$PWD/PlayAuralMobile-unsigned.ipa" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
