name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd mobile_client/ios
          pod install --repo-update

      - name: Detect workspace and scheme
        id: detect
        run: |
          set -e
          cd mobile_client/ios
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              echo "WORKSPACE=$d" >> "$GITHUB_OUTPUT"
              break
            fi
          done
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/{flag=1;next} flag && NF{print $1; exit}')
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $d, Scheme: $SCHEME"

      - name: Build .app with xcodebuild
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE="${{ steps.detect.outputs.WORKSPACE }}"
          SCHEME="${{ steps.detect.outputs.SCHEME }}"
          DD="$PWD/build/DerivedData"

          # Build the app target. We do NOT set CODE_SIGNING_ALLOWED=NO
          # to avoid Expo module-map issues. An empty identity prevents
          # actual signing but lets compilation proceed normally.
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DD" \
            build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO 2>&1 || true

          # Find the built .app in DerivedData
          APP_PATH=$(find "$DD" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found — checking build output..."
            # Look for any errors in the xcodebuild log
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
              -configuration Debug \
              -derivedDataPath "$DD/debug" \
              build \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO 2>&1 | tail -50 || true
            APP_PATH=$(find "$DD/debug" -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app produced. Build failed."
            exit 1
          fi
          echo "App found at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"
        id: build

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa
          echo "IPA=$PWD/PlayAuralMobile-unsigned.ipa" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
