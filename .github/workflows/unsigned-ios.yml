name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd mobile_client/ios
          pod install --repo-update

      - name: Build unsigned archive and package .ipa
        run: |
          set -e
          cd mobile_client/ios

          # find .xcworkspace directory (must be a directory, not contents.xcworkspacedata)
          WORKSPACE_DIR=""
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              WORKSPACE_DIR="$d"
              break
            fi
          done
          if [ -z "$WORKSPACE_DIR" ]; then
            echo "Error: no .xcworkspace directory found"
            ls -la
            exit 1
          fi
          echo "Using workspace: $WORKSPACE_DIR"

          # detect scheme from workspace
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE_DIR" 2>/dev/null | awk '/Schemes:/{flag=1;next} flag && NF{print $1; exit}')
          if [ -z "$SCHEME" ]; then
            echo "Error: could not detect scheme"
            exit 1
          fi
          echo "Using scheme: $SCHEME"

          ARCHIVE_PATH="$PWD/build/Archive.xcarchive"
          mkdir -p "$(dirname "$ARCHIVE_PATH")"

          # archive without code signing
          xcodebuild -workspace "$WORKSPACE_DIR" -scheme "$SCHEME" -configuration Release -archivePath "$ARCHIVE_PATH" archive CODE_SIGNING_ALLOWED=NO

          # package unsigned .ipa from .xcarchive
          APP_PATH="$ARCHIVE_PATH/Products/Applications/${SCHEME}.app"
          echo "App path: $APP_PATH"

          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
