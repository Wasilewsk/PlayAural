name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd mobile_client/ios

          # Add SWIFT_STRICT_CONCURRENCY=0 to the existing post_install hook
          # (CocoaPods rejects duplicate post_install hooks).
          ruby -e '
            content = File.read("Podfile")
            # Find the existing post_install do |installer| block and inject
            # our concurrency setting inside it, before the closing end
            lines = content.lines
            idx = lines.rindex { |l| l.include?("post_install") && l.include?("|installer|") }
            if idx
              indent = lines[idx][/\A\s*/]
              hook_lines = [
                "#{indent}  # Disable Swift 6 strict concurrency for all pod targets\n",
                "#{indent}  installer.pods_project.targets.each do |target|\n",
                "#{indent}    target.build_configurations.each do |config|\n",
                "#{indent}      config.build_settings[\"SWIFT_STRICT_CONCURRENCY\"] = \"0\"\n",
                "#{indent}    end\n",
                "#{indent}  end\n",
              ]
              lines.insert(idx + 1, *hook_lines)
              File.write("Podfile", lines.join)
            else
              $stderr.puts "WARNING: could not find post_install hook in Podfile"
              exit 1
            end
          '

          pod install --repo-update

      - name: Detect workspace and scheme
        id: detect
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE=""
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              WORKSPACE="$d"
              break
            fi
          done
          echo "Found workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"

          # Use -json for reliable scheme detection
          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ws=d.get('workspace',{}); schemes=ws.get('schemes',[]) or d.get('project',{}).get('schemes',[]); print(schemes[0] if schemes else '')")
          if [ -z "$SCHEME" ]; then
            # Fallback: grep the .xcodeproj for scheme names
            SCHEME=$(ls -d *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj//')
          fi
          echo "Found scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build .app with xcodebuild
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE="${{ steps.detect.outputs.WORKSPACE }}"
          SCHEME="${{ steps.detect.outputs.SCHEME }}"
          DD="$PWD/build/DerivedData"

          # Must specify iOS destination — otherwise xcodebuild defaults to
          # Mac Catalyst where ExpoModulesCore headers are incomplete.
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DD" \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=0 2>&1 || true

          # Find the built .app in DerivedData
          APP_PATH=$(find "$DD" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app produced. Build failed."
            exit 1
          fi
          echo "App found at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"
        id: build

      - name: Package unsigned .ipa
        run: |
          set -e
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa
          echo "IPA=$PWD/PlayAuralMobile-unsigned.ipa" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
