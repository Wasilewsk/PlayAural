name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build_unsigned_ipa:
    runs-on: macos-15
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: |
          cd mobile_client
          npm ci

      - name: Prebuild iOS
        run: |
          cd mobile_client
          npx expo prebuild --platform ios --no-install 2>&1 || true

      - name: Patch Podfile post_install
        run: |
          cd mobile_client/ios
          cat > patch_podfile.rb << 'RUBYEOF'
          require "pathname"

          content = File.read("Podfile")
          lines = content.lines
          out = []
          i = 0
          while i < lines.length
            line = lines[i]
            if line =~ /^\s*post_install\b/
              depth = 0
              depth += line.scan(/\bdo\b/).length + line.count("{")
              depth -= line.count("}")
              depth -= 1 if line.strip.start_with?("end")
              i += 1
              while i < lines.length && depth > 0
                cur = lines[i]
                stripped = cur.strip
                unless stripped.start_with?("#")
                  depth += cur.scan(/\bdo\b/).length + cur.count("{")
                  depth -= cur.count("}")
                  depth -= 1 if stripped.start_with?("end")
                end
                i += 1
              end
            else
              out << line
              i += 1
            end
          end

          new_post_install = <<~RUBY
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                has_swift = false
                if target.respond_to?(:source_build_phase) && target.source_build_phase
                  has_swift = target.source_build_phase.files.any? do |f|
                    f.file_ref && f.file_ref.respond_to?(:path) && f.file_ref.path && f.file_ref.path.end_with?(".swift")
                  end
                end

                target.build_configurations.each do |config|
                  config.build_settings["CLANG_CXX_LANGUAGE_STANDARD"] = "gnu++20"
                  config.build_settings["DEFINES_MODULE"] = "YES"

                  if has_swift
                    config.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"
                    config.build_settings["SWIFT_VERSION"] = "6.0"
                    existing_flags = config.build_settings["OTHER_SWIFT_FLAGS"] || ""
                    config.build_settings["OTHER_SWIFT_FLAGS"] = (existing_flags + " -strict-concurrency=minimal").strip
                  end
                end
              end

              # Wire livekit-react-native to find the webrtc modulemap
              webrtc_dir = nil
              installer.pods_project.targets.each do |t|
                webrtc_dir = File.join(installer.sandbox.target_support_files_root, t.name) if t.name == "livekit-react-native-webrtc"
              end

              if webrtc_dir
                installer.pods_project.targets.each do |target|
                  if target.name == "livekit-react-native"
                    target.build_configurations.each do |config|
                      paths = config.build_settings["SWIFT_INCLUDE_PATHS"] || ""
                      config.build_settings["SWIFT_INCLUDE_PATHS"] = "#{paths} #{webrtc_dir}".strip unless paths.include?(webrtc_dir)
                    end
                  end
                end
              end
            end
          RUBY

          out << "\n" + new_post_install
          File.write("Podfile", out.join)
          puts "Podfile patched successfully."
          RUBYEOF
          ruby patch_podfile.rb

      - name: Install CocoaPods
        run: |
          cd mobile_client/ios
          pod install --repo-update

          # Verify modulemaps were generated
          echo "=== Modulemaps ==="
          find "Pods/Target Support Files" -name "*.modulemap" 2>/dev/null | head -20

          # Fallback: patch xcconfig directly if the Podfile hook didn't work
          XCCONFIG=$(find "Pods/Target Support Files/livekit-react-native" -name "*.xcconfig" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$XCCONFIG" ]; then
            WEBRTC_DIR="$(pwd)/Pods/Target Support Files/livekit-react-native-webrtc"
            if [ -d "$WEBRTC_DIR" ] && ! grep -q "livekit-react-native-webrtc" "$XCCONFIG" 2>/dev/null; then
              echo "SWIFT_INCLUDE_PATHS = ${inherited} ${WEBRTC_DIR}" >> "$XCCONFIG"
              echo "Patched xcconfig: $XCCONFIG"
            fi
          fi

      - name: Detect workspace and scheme
        id: detect
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE=""
          for d in *.xcworkspace; do
            if [ -d "$d" ]; then
              WORKSPACE="$d"
              break
            fi
          done
          echo "Found workspace: $WORKSPACE"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"

          APP_NAME="PlayAuralMobile"
          SCHEME=""

          SCHEMES_JSON=$(xcodebuild -list -json -workspace "$WORKSPACE" 2>/dev/null || true)
          if [ -n "$SCHEMES_JSON" ]; then
            SCHEME=$(echo "$SCHEMES_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ws = d.get('workspace', {})
          schemes = ws.get('schemes', []) or d.get('project', {}).get('schemes', [])
          app_name = '$APP_NAME'
          for s in schemes:
              if s == app_name:
                  print(s)
                  sys.exit(0)
          print('')
          ")
          fi

          if [ -z "$SCHEME" ]; then
            SCHEME="$APP_NAME"
          fi

          echo "Found scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build .app with xcodebuild
        id: build
        run: |
          set -e
          cd mobile_client/ios
          WORKSPACE="${{ steps.detect.outputs.WORKSPACE }}"
          SCHEME="${{ steps.detect.outputs.SCHEME }}"
          DD="$PWD/build/DerivedData"

          export REACT_NATIVE_PATH="$GITHUB_WORKSPACE/mobile_client/node_modules/react-native"

          if [ ! -f "$REACT_NATIVE_PATH/scripts/xcode/with-environment.sh" ]; then
            echo "Error: $REACT_NATIVE_PATH/scripts/xcode/with-environment.sh not found."
            echo "Check that npx expo prebuild and pod install completed successfully."
            exit 1
          fi

          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DD" \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CLANG_CXX_LANGUAGE_STANDARD=gnu++20 2>&1

          APP_PATH=$(find "$DD" -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: no .app produced. Build failed."
            exit 1
          fi
          echo "App found at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package unsigned .ipa
        id: package
        run: |
          set -e
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/
          cd unsigned
          zip -r ../PlayAuralMobile-unsigned.ipa Payload
          cd ..
          ls -lh PlayAuralMobile-unsigned.ipa
          echo "IPA=$PWD/PlayAuralMobile-unsigned.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: mobile_client/ios/PlayAuralMobile-unsigned.ipa
